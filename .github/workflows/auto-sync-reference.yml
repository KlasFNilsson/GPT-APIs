name: Speediance Sync (Reference Daily)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"  # daily, UTC

permissions:
  contents: write

concurrency:
  group: speediance-sync
  cancel-in-progress: false

jobs:
  sync_reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run reference sync
        env:
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }} 
          SPEEDIANCE_TOKEN: ${{ secrets.SPEEDIANCE_TOKEN }}
          SPEEDIANCE_USER_ID: ${{ secrets.SPEEDIANCE_USER_ID }}
          SYNC_MODE: training   # eller reference
        run: |
          python sync_speediance.py

      - name: Commit changes (daily, robust)
        run: |
          git config user.name "speediance-mirror-bot"
          git config user.email "actions@users.noreply.github.com"

          # Add only what exists
          test -f data/training_records.json && git add data/training_records.json || true
          test -f data/training_stats.json && git add data/training_stats.json || true
          test -f data/library_lookup.json && git add data/library_lookup.json || true
          test -f data/sync_env_sanity.json && git add data/sync_env_sanity.json || true

          test -d data/training_compact && git add data/training_compact || true

          # If nothing to commit, don't fail
          git diff --cached --quiet || git commit -m "daily-sync: update"
          git push
