name: Speediance Sync (Reference Daily)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"  # daily, UTC

permissions:
  contents: write

concurrency:
  group: speediance-sync
  cancel-in-progress: false

jobs:
  sync_reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run reference sync
        env:
          SYNC_MODE: reference
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }}
          SPEEDIANCE_TOKEN: ${{ secrets.SPEEDIANCE_TOKEN }}
          SPEEDIANCE_USER_ID: ${{ secrets.SPEEDIANCE_USER_ID }}
          SPEEDIANCE_EMAIL: ${{ secrets.SPEEDIANCE_EMAIL }}
          SPEEDIANCE_PASSWORD: ${{ secrets.SPEEDIANCE_PASSWORD }}
        run: |
          python sync_speediance.py

      - name: Commit changes (reference only)
        run: |
          git config user.name "speediance-mirror-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/reference.json
          git diff --cached --quiet || git commit -m "daily-sync: reference"
          git push
