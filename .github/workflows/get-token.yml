name: Get Speediance Token (one-off)

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Login and print base64 token + user_id
        env:
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }}
          SPEEDIANCE_EMAIL: ${{ secrets.SPEEDIANCE_EMAIL }}
          SPEEDIANCE_PASSWORD: ${{ secrets.SPEEDIANCE_PASSWORD }}
        run: |
          python - <<'PY'
          import os, base64, json
          from api_client import SpeedianceClient

          def env(name, default=""):
              v = os.getenv(name)
              return v.strip() if v else default

          c = SpeedianceClient()

          c.save_config(
              user_id="",
              token="",
              region=env("SPEEDIANCE_REGION","Global"),
              unit=int(env("SPEEDIANCE_UNIT","0")),
              custom_instruction="",
              device_type=int(env("SPEEDIANCE_DEVICE_TYPE","1")),
              allow_monster_moves=env("SPEEDIANCE_ALLOW_MONSTER_MOVES","false").lower() in ("1","true")
          )

          ok, msg, err = c.login(os.environ["SPEEDIANCE_EMAIL"], os.environ["SPEEDIANCE_PASSWORD"])
          if not ok:
              raise Exception(msg)

          creds = c.credentials

          uid = creds["user_id"]
          token = creds["token"]

          print("USER_ID_B64=", base64.b64encode(uid.encode()).decode())
          print("TOKEN_PART1=", token[:20])
          print("TOKEN_PART2=", token[20:40])
          print("TOKEN_PART3=", token[40:])
          PY
