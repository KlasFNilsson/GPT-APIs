name: Get Speediance Token (one-off)

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Login and print token + user_id
        env:
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }}
          SPEEDIANCE_EMAIL: ${{ secrets.SPEEDIANCE_EMAIL }}
          SPEEDIANCE_PASSWORD: ${{ secrets.SPEEDIANCE_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          from api_client import SpeedianceClient

          def env_str(name, default=""):
              v = os.getenv(name)
              return (v.strip() if v else default)

          def env_int(name, default):
              v = os.getenv(name)
              v = (v.strip() if v else "")
              try:
                  return int(v)
              except Exception:
                  return default

          def env_bool(name, default=False):
              v = os.getenv(name)
              v = (v.strip().lower() if v else "")
              if v == "":
                  return default
              return v in ("1","true","yes","y","on")

          def pick_first(obj, candidates):
              for k in candidates:
                  if isinstance(obj, dict) and k in obj and obj[k] not in (None, ""):
                      return obj[k]
                  if hasattr(obj, k):
                      v = getattr(obj, k)
                      if v not in (None, ""):
                          return v
              return None

          c = SpeedianceClient()

          # Apply config BEFORE login
          c.save_config(
              user_id="",
              token="",
              region=env_str("SPEEDIANCE_REGION", "Global"),
              unit=env_int("SPEEDIANCE_UNIT", 0),
              custom_instruction="",
              device_type=env_int("SPEEDIANCE_DEVICE_TYPE", 1),
              allow_monster_moves=env_bool("SPEEDIANCE_ALLOW_MONSTER_MOVES", False),
          )

          print("REGION =", getattr(c, "region", None))
          if hasattr(c, "base_url"): print("BASE_URL =", getattr(c, "base_url"))
          if hasattr(c, "host"): print("HOST =", getattr(c, "host"))

          ok, msg, err = c.login(os.environ["SPEEDIANCE_EMAIL"], os.environ["SPEEDIANCE_PASSWORD"])
          if not ok:
              raise Exception(f"Login failed: {msg}\n{err or ''}")

          # Try to extract token/user_id from common attribute names
          token = pick_first(c, ["token", "accessToken", "access_token", "authToken", "authorization"])
          user_id = pick_first(c, ["user_id", "userId", "userid", "uid"])

          # Some clients store user info dict
          user_info = pick_first(c, ["userInfo", "user_info", "profile", "me"])
          if user_id is None and isinstance(user_info, dict):
              user_id = pick_first(user_info, ["userId", "user_id", "id", "uid"])
          if token is None and isinstance(user_info, dict):
              token = pick_first(user_info, ["token", "accessToken", "access_token"])

          # Last resort: read config the client wrote
          config = pick_first(c, ["config", "cfg"])
          if isinstance(config, dict):
              if user_id is None:
                  user_id = pick_first(config, ["user_id", "userId", "id", "uid"])
              if token is None:
                  token = pick_first(config, ["token", "accessToken", "access_token"])

          print("SPEEDIANCE_USER_ID=", user_id)
          print("SPEEDIANCE_TOKEN=", token)

          if not user_id or not token:
              # Provide a list of attributes to help pinpoint where they are stored
              attrs = [a for a in dir(c) if not a.startswith("_")]
              print("Could not locate user_id/token. Available attributes:", attrs[:80])
              raise Exception("Could not locate user_id/token on client after login.")
          PY
