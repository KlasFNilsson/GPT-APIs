name: Set Speediance Secrets (no log output)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set_secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pynacl requests

      - name: Login to Speediance and update repo secrets
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }}
          SPEEDIANCE_EMAIL: ${{ secrets.SPEEDIANCE_EMAIL }}
          SPEEDIANCE_PASSWORD: ${{ secrets.SPEEDIANCE_PASSWORD }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os, json, base64
          import requests
          from nacl import encoding, public
          from api_client import SpeedianceClient

          def env_str(name, default=""):
              v = os.getenv(name)
              return v.strip() if v else default

          def env_int(name, default):
              v = os.getenv(name)
              v = (v.strip() if v else "")
              try: return int(v)
              except: return default

          def env_bool(name, default=False):
              v = os.getenv(name)
              v = (v.strip().lower() if v else "")
              if v == "": return default
              return v in ("1","true","yes","y","on")

          # --- 1) Login to Speediance ---
          c = SpeedianceClient()
          c.save_config(
              user_id="",
              token="",
              region=env_str("SPEEDIANCE_REGION","Global"),
              unit=env_int("SPEEDIANCE_UNIT", 0),
              custom_instruction="",
              device_type=env_int("SPEEDIANCE_DEVICE_TYPE", 1),
              allow_monster_moves=env_bool("SPEEDIANCE_ALLOW_MONSTER_MOVES", False),
          )

          ok, msg, err = c.login(os.environ["SPEEDIANCE_EMAIL"], os.environ["SPEEDIANCE_PASSWORD"])
          if not ok:
              raise Exception(f"Speediance login failed: {msg}\n{err or ''}")

          creds = getattr(c, "credentials", None)
          if not isinstance(creds, dict) or "user_id" not in creds or "token" not in creds:
              raise Exception("Could not find credentials['user_id'] and credentials['token'].")

          speed_user_id = str(creds["user_id"])
          speed_token = str(creds["token"])

          # --- 2) GitHub API helpers for encrypted secrets ---
          gh_pat = os.environ["GH_PAT"]
          repo = os.environ["GITHUB_REPOSITORY"]  # "owner/repo"
          api = "https://api.github.com"
          headers = {
              "Authorization": f"Bearer {gh_pat}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          # Get repo public key for secrets encryption
          r = requests.get(f"{api}/repos/{repo}/actions/secrets/public-key", headers=headers, timeout=30)
          r.raise_for_status()
          pk = r.json()
          key_id = pk["key_id"]
          key = pk["key"]

          def encrypt_secret(public_key_b64: str, secret_value: str) -> str:
              public_key = public.PublicKey(public_key_b64.encode("utf-8"), encoding.Base64Encoder())
              sealed_box = public.SealedBox(public_key)
              encrypted = sealed_box.encrypt(secret_value.encode("utf-8"))
              return base64.b64encode(encrypted).decode("utf-8")

          def put_secret(name: str, value: str):
              encrypted_value = encrypt_secret(key, value)
              payload = {"encrypted_value": encrypted_value, "key_id": key_id}
              rr = requests.put(f"{api}/repos/{repo}/actions/secrets/{name}", headers=headers, json=payload, timeout=30)
              rr.raise_for_status()

          # Update secrets WITHOUT printing values
          put_secret("SPEEDIANCE_USER_ID", speed_user_id)
          put_secret("SPEEDIANCE_TOKEN", speed_token)

          print("Updated SPEEDIANCE_USER_ID and SPEEDIANCE_TOKEN secrets successfully.")
          PY
