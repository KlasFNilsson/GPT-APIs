name: Speediance Flat Export

on:
  workflow_dispatch:
  repository_dispatch:
    types: [speediance_flat]
  schedule:
    - cron: "15 2 * * *"

concurrency:
  group: speediance-flat-export-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run flat sync (fetch training_flat.json/.csv)
        env:
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }}
          SPEEDIANCE_TOKEN: ${{ secrets.SPEEDIANCE_TOKEN }}
          SPEEDIANCE_USER_ID: ${{ secrets.SPEEDIANCE_USER_ID }}
          TRAINING_DAYS: ${{ github.event.client_payload.training_days || 365 }}
        run: |
          python sync_speediance_flat_only.py

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/training_flat.json data/training_flat.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update training flat export"

          # Bring local main up to date before pushing
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./data

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
