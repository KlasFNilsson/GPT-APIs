name: Speediance Sync (Training Frequent)

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"  # hourly, UTC

permissions:
  contents: write

concurrency:
  group: speediance-sync
  cancel-in-progress: false

jobs:
  sync_training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run training sync
        env:
          SYNC_MODE: training
          TRAINING_DAYS: ${{ secrets.TRAINING_DAYS }}
          MAX_TRAINING_DETAILS: ${{ secrets.MAX_TRAINING_DETAILS }}
          SPEEDIANCE_REGION: ${{ secrets.SPEEDIANCE_REGION }}
          SPEEDIANCE_DEVICE_TYPE: ${{ secrets.SPEEDIANCE_DEVICE_TYPE }}
          SPEEDIANCE_ALLOW_MONSTER_MOVES: ${{ secrets.SPEEDIANCE_ALLOW_MONSTER_MOVES }}
          SPEEDIANCE_UNIT: ${{ secrets.SPEEDIANCE_UNIT }}
          SPEEDIANCE_TOKEN: ${{ secrets.SPEEDIANCE_TOKEN }}
          SPEEDIANCE_USER_ID: ${{ secrets.SPEEDIANCE_USER_ID }}
          SPEEDIANCE_EMAIL: ${{ secrets.SPEEDIANCE_EMAIL }}
          SPEEDIANCE_PASSWORD: ${{ secrets.SPEEDIANCE_PASSWORD }}
        run: |
          python sync_speediance.py

      - name: Debug output files (safe)
        run: |
          echo "=== TREE data/ ==="
          ls -R data || true
          echo "=== FILES data/ ==="
          find data -maxdepth 4 -type f -print || true
          echo "=== HEAD training_records.json ==="
          test -f data/training_records.json && head -n 40 data/training_records.json || echo "missing training_records.json"
          echo "=== HEAD training_details/index.json ==="
          test -f data/training_details/index.json && head -n 80 data/training_details/index.json || echo "missing training_details/index.json"

      - name: Commit changes (training only, robust)
        run: |
          git config user.name "speediance-mirror-bot"
          git config user.email "actions@users.noreply.github.com"

          # Always add these if present
          test -f data/training_records.json && git add data/training_records.json || true
          test -f data/training_stats.json && git add data/training_stats.json || true

          # Add the whole directory if it exists (works even if only index exists)
          test -d data/training_details && git add data/training_details || true

          git diff --cached --quiet || git commit -m "freq-sync: training"
          git push
